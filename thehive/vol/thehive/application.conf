## TheHive Configuration (Auto-Generated)
play.http.secret.key="${?THEHIVE_SECRET}"
db.janusgraph {
  storage {
    backend = cql
    hostname = ["cassandra"]
    cql {
      cluster-name = thp
      keyspace = thehive
    }
  }
  index.search {
    backend = elasticsearch
    hostname = ["es7-cti"]
    index-name = thehive
  }
}
storage {
  provider = localfs
  localfs.location = /opt/thp/thehive/data
}

## SMTP Configuration
play.mailer {
  host = ${?SMTP_HOST}
  port = ${?SMTP_PORT}
  auth = false
  tls = false
  ssl = false
  user = ${?SMTP_USERNAME}
  password = ${?SMTP_PASSWORD}
}

## IMAP Configuration
imap {
  host = ${?IMAP_HOST}
  port = ${?IMAP_PORT}
  ssl = false
  starttls = true
  user = ${?IMAP_USERNAME}
  password = ${?IMAP_PASSWORD}
}
