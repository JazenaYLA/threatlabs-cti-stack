services:
  cassandra:
    image: cassandra:4.1
    container_name: thehive-cassandra
    restart: unless-stopped
    ports:
      - 9042:9042 # CQL port
    environment:
      - CASSANDRA_CLUSTER_NAME=TheHive
      - CASSANDRA_DC=dc1
      - MAX_HEAP_SIZE=2G
      - HEAP_NEWSIZE=800M
    volumes:
      - ./vol/cassandra/data:/var/lib/cassandra/data
    networks:
      - cti-net
    healthcheck:
      test:
        - CMD
        - cqlsh
        - -e
        - describe keyspaces;
      interval: 30s
      timeout: 10s
      retries: 15
  thehive:
    image: thehiveproject/thehive4:4.1.15
    container_name: thehive-cti
    restart: unless-stopped
    volumes:
      - ./vol/thehive/application.conf:/etc/thehive/application.conf:ro
      - ./vol/thehive/data:/opt/thp/thehive/data
    ports:
      - ${THEHIVE_PORT:-9000}:9000
    environment:
      - CQL_HOSTNAMES=cassandra
      # TheHive 4 requires ES 7.x (ES 8.x not supported for TH4)
      - ES_HOSTS=es7-cti:9200
      - THEHIVE_SECRET=${THEHIVE_SECRET}
      - CORTEX_KEY=${CORTEX_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME:-""}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-""}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT}
      - IMAP_USERNAME=${IMAP_USERNAME}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - cti-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.thehive.rule=Host(`thehive.local`)
      - traefik.http.services.thehive.loadbalancer.server.port=9000
      - kuma.thehive.http.name=TheHive
      - kuma.thehive.http.url=http://thehive.lab.local
networks:
  cti-net:
    external: true
    name: cti-net
